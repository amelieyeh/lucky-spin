<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Spin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Home screen -->
  <div id="homeScreen" class="container home-screen">
    <h1 class="title">Lucky Spin</h1>
    <p class="home-subtitle">Pick a spin or create your own</p>
    <div class="home-cards" id="homeCards"></div>
  </div>

  <!-- Spin screen -->
  <div id="spinScreen" class="container spin-screen" hidden>
    <header class="spin-header">
      <button id="backBtn" class="back-btn">&larr; Back</button>
      <h2 class="spin-title" id="spinTitle"></h2>
    </header>
    <p class="description" id="description"></p>
    <button id="spinBtn" class="spin-btn" disabled>Spin!</button>
    <div id="gridContainer" class="grid-container"></div>
  </div>

  <!-- Result modal -->
  <div id="resultModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Create modal -->
  <div id="createModal" class="modal-overlay">
    <div class="modal create-modal">
      <button class="modal-close" id="createModalClose">&times;</button>
      <h3 class="create-title">Create New Spin</h3>
      <div class="create-form">
        <div class="form-group">
          <label for="createTitle">Title</label>
          <input type="text" id="createTitle" placeholder="e.g. Lunch Roulette">
        </div>
        <div class="form-group">
          <label for="createDescription">Description</label>
          <input type="text" id="createDescription" placeholder="e.g. Where to eat today?">
        </div>
        <div class="form-group">
          <label for="createOrigin">Origin (optional)</label>
          <input type="text" id="createOrigin" placeholder="e.g. Starting point">
        </div>
        <div class="form-group">
          <label for="createMap">Region / Country</label>
          <select id="createMap">
            <option value="">None (plain grid)</option>
            <option value="Taiwan">Taiwan / 台灣</option>
            <option value="Tokyo23">Tokyo 23区 / 東京</option>
            <option value="Japan">Japan / 日本 (47都道府県)</option>
          </select>
          <span class="builtin-hint" id="builtinHint" hidden></span>
        </div>
        <div class="form-group">
          <label for="createSearchSuffix">Maps search suffix</label>
          <input type="text" id="createSearchSuffix" placeholder="e.g. 車站, 東京 (appended to label for Google Maps)">
        </div>
        <div class="form-group">
          <label for="createSpinText">Spin button text</label>
          <input type="text" id="createSpinText" placeholder="Spin!">
        </div>
        <div id="jsonFileSection">
          <div class="form-divider"></div>
          <div class="form-group">
            <label>JSON Data File</label>
            <label class="import-btn-lg">
              Choose JSON file...
              <input type="file" id="createFileInput" accept=".json" hidden>
            </label>
            <span class="file-name" id="createFileName"></span>
          </div>
        </div>
        <button id="createSubmit" class="spin-btn create-submit" disabled>Load Spin</button>
      </div>
    </div>
  </div>

  <script src="data/builtin-regions.js"></script>
  <script src="app.js"></script>
</body>
</html>
